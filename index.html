<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="2026 FIFA World Cup Tracker - Live Standings, Matches, and Knockout Bracket">
  <title>2026 World Cup Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-effects">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
  </div>

  <header class="app-header">
    <div class="header-content">
      <h1>FIFA World Cup <span>2026</span></h1>
      <nav class="main-nav">
        <button class="nav-btn active" data-target="groups-view">Groups</button>
        <button class="nav-btn" data-target="matches-view">Matches</button>
        <button class="nav-btn" data-target="bracket-view">Knockout Bracket</button>
      </nav>
    </div>
  </header>

  <main class="app-main">
    <!-- Groups View -->
    <section id="groups-view" class="view-section active">
      <div class="groups-grid" id="groups-container">
        <!-- Groups will be injected here by app.js -->
      </div>
    </section>

    <!-- Matches View -->
    <section id="matches-view" class="view-section">
      <div class="matches-grid" id="matches-container">
        <!-- Matches will be injected here by app.js -->
      </div>
    </section>

    <!-- Bracket View -->
    <section id="bracket-view" class="view-section">
      <div class="bracket-container" id="bracket-container">
        <!-- Bracket will be injected here by app.js -->
      </div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
